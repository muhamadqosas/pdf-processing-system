<script>
// ══════════════════════════════════════════════
//  CONFIG — satu-satunya tempat untuk URL backend
// ══════════════════════════════════════════════
const CONFIG = {
  DEFAULT_API_BASE: 'https://api.qcdefect.online',
  get API_BASE() {
    return localStorage.getItem('API_BASE') || this.DEFAULT_API_BASE;
  }
};

// Helper: bangun URL endpoint
function api(path) {
  return CONFIG.API_BASE + path;
}

// ── State ──
let selFile = null;
let jobId = null;
let t0 = null;
let pollIv = null;
let elapsedIv = null;
let currentProgress = 0;
let lastStatus = null;

// ── Steps (visual) ──
const STEPS = [
  'Validasi & upload PDF',
  'Konversi PDF → Excel (ilovepdf)',
  'Upload Excel ke Google Drive',
  'Jalankan Apps Script',
  'Proses data QC di Spreadsheet',
  'Download hasil dari Drive',
  'Finalisasi & siap unduh',
];

// ── Helpers ──
function ts() {
  return ((Date.now() - (t0 || Date.now())) / 1000).toFixed(1) + 's';
}

function addLog(msg, type) {
  type = type || 'i';
  const body = document.getElementById('log-body');
  const line = document.createElement('div');
  line.className = 'll';
  line.innerHTML = '<span class="lt">' + ts() + '</span><span class="lm ' + type + '">' + msg + '</span>';
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
}

function setProgress(pct, label) {
  const p = Math.max(0, Math.min(100, Math.round(pct)));
  document.getElementById('prog-bar').style.width = p + '%';
  document.getElementById('prog-pct').textContent = p + '%';
  if (label) document.getElementById('prog-label').textContent = label;
  currentProgress = p;
}

function setStatusPill(online) {
  const pill = document.querySelector('.status-pill');
  const dot = pill.querySelector('.live-dot');
  const span = pill.querySelector('span');
  if (online) {
    pill.style.background = 'var(--success-bg)';
    pill.style.borderColor = '#A7F3D0';
    pill.style.color = '#059669';
    dot.style.background = 'var(--success)';
    dot.style.animation = '';
    span.textContent = 'Siap';
  } else {
    pill.style.background = 'var(--danger-bg)';
    pill.style.borderColor = '#FCA5A5';
    pill.style.color = '#DC2626';
    dot.style.background = 'var(--danger)';
    dot.style.animation = 'none';
    span.textContent = 'Offline';
  }
}

// ── Drag & drop ──
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', function() { zone.classList.remove('drag'); });
zone.addEventListener('drop', function(e) {
  e.preventDefault();
  zone.classList.remove('drag');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files);
});

// ── File handling ──
function handleFile(files) {
  const f = files[0];
  if (!f.name.toLowerCase().endsWith('.pdf')) return alert('Hanya file PDF yang diterima.');
  if (f.size > 15 * 1024 * 1024) return alert('File terlalu besar (' + (f.size/1024/1024).toFixed(1) + ' MB). Batas: 15 MB.');
  selFile = f;
  document.getElementById('f-name').textContent = f.name;
  document.getElementById('f-size').textContent = (f.size/1024/1024).toFixed(2) + ' MB · PDF';
  document.getElementById('file-row').classList.add('show');
  document.getElementById('btn-main').disabled = false;
}

function clearFile(e) {
  e.stopPropagation();
  selFile = null;
  document.getElementById('file-input').value = '';
  document.getElementById('file-row').classList.remove('show');
  document.getElementById('btn-main').disabled = true;
}

// ── Pipeline highlight ──
function renderPipeline(active) {
  for (var i = 0; i < 4; i++) {
    const el = document.getElementById('ps' + i);
    el.classList.remove('active-step', 'done-step');
    if (i < active) el.classList.add('done-step');
    else if (i === active) el.classList.add('active-step');
  }
}

// ── Steps ──
function renderSteps(ai) {
  document.getElementById('prog-steps').innerHTML = STEPS.map(function(s, i) {
    const c = i < ai ? 'done' : i === ai ? 'act' : '';
    const d = i < ai ? '&#x2713;' : '';
    return '<div class="ps ' + c + '"><div class="ps-dot">' + d + '</div><span>' + s + '</span></div>';
  }).join('');
}

// ── Queue (data nyata dari GET /queue) ──
async function fetchAndRenderQueue(myStatus) {
  const bmap = {
    processing: '<span class="stbadge sp"><span class="sd"></span>Diproses</span>',
    waiting:    '<span class="stbadge sw"><span class="sd"></span>Menunggu</span>',
    completed:  '<span class="stbadge sk"><span class="sd"></span>Selesai</span>',
    error:      '<span class="stbadge se"><span class="sd"></span>Gagal</span>',
  };

  let waiting = 0, processing = 0, completed = 0;
  try {
    const res = await fetch(api('/queue'));
    const data = await res.json();
    waiting = data.waiting || 0;
    processing = data.processing || 0;
    completed = data.completed || 0;
  } catch (_) {}

  const effectiveStatus = myStatus || 'waiting';
  const activeCount = waiting + processing;
  document.getElementById('q-badge').textContent = activeCount + ' file';

  const rows = [];
  const fname = selFile ? selFile.name : 'file.pdf';
  const fsize = selFile ? (selFile.size/1024/1024).toFixed(2) + ' MB' : '';

  rows.push(
    '<div class="q-row mine">' +
      '<div class="q-num me">1</div>' +
      '<div class="q-inf">' +
        '<div class="q-name-row">' +
          '<span class="q-name">' + fname + '</span>' +
          '<span class="q-me-tag">&#9654; Milikmu</span>' +
        '</div>' +
        '<div class="q-meta">' + fsize + '</div>' +
      '</div>' +
      (bmap[effectiveStatus] || '') +
    '</div>'
  );

  if (waiting > 1) {
    rows.push(
      '<div class="q-row">' +
        '<div class="q-num">' + waiting + '</div>' +
        '<div class="q-inf">' +
          '<div class="q-name-row"><span class="q-name">' + (waiting - 1) + ' file lain menunggu</span></div>' +
          '<div class="q-meta">Antrian FIFO</div>' +
        '</div>' +
        bmap['waiting'] +
      '</div>'
    );
  }
  if (processing > 1) {
    rows.push(
      '<div class="q-row">' +
        '<div class="q-num proc">' + processing + '</div>' +
        '<div class="q-inf">' +
          '<div class="q-name-row"><span class="q-name">' + processing + ' file sedang diproses</span></div>' +
          '<div class="q-meta">Worker aktif</div>' +
        '</div>' +
        bmap['processing'] +
      '</div>'
    );
  }
  if (completed > 0) {
    rows.push(
      '<div class="q-row">' +
        '<div class="q-num" style="background:var(--success-bg);color:#059669">' + completed + '</div>' +
        '<div class="q-inf">' +
          '<div class="q-name-row"><span class="q-name">' + completed + ' file selesai</span></div>' +
          '<div class="q-meta">Sesi ini</div>' +
        '</div>' +
        bmap['completed'] +
      '</div>'
    );
  }

  document.getElementById('q-list').innerHTML = rows.join('');
}

// ── Status → log & UI (hanya emit sekali per status) ──
function handleStatusChange(data) {
  const status = data.status;

  // Update progress & stage dari backend (berlaku untuk semua status)
  if (typeof data.progress === 'number') {
    const stage = data.stage || null;
    setProgress(data.progress, stage);
  }

  if (status === lastStatus) return;
  lastStatus = status;

  if (status === 'waiting') {
    addLog('[INFO] File berhasil diupload', 'i');
    addLog('[INFO] Job ID diterima: ' + jobId, 'i');
    addLog('[INFO] Menunggu dalam antrian…', 'i');
    if (typeof data.progress !== 'number') setProgress(10, 'Menunggu dalam antrian…');
    renderSteps(0);
    renderPipeline(0);
    fetchAndRenderQueue('waiting');

  } else if (status === 'processing') {
    addLog('[INFO] Worker mulai memproses', 'i');
    addLog('[INFO] Konversi PDF → Excel via ilovepdf…', 'i');
    renderSteps(1);
    renderPipeline(1);
    fetchAndRenderQueue('processing');

  } else if (status === 'completed') {
    addLog('[INFO] Mengunduh hasil…', 'i');
    addLog('[SUCCESS] Proses selesai ✅', 'ok');
    setProgress(100, 'Selesai!');
    renderSteps(STEPS.length);
    renderPipeline(4);
    fetchAndRenderQueue('completed');
    stopPolling();
    setTimeout(showResult, 700);

  } else if (status === 'error') {
    addLog('[ERROR] Terjadi kesalahan saat memproses file', 'e');
    setProgress(0, 'Gagal');
    renderPipeline(-1);
    fetchAndRenderQueue('error');
    stopPolling();
  }
}

// ── Polling GET /status/<job_id> setiap 2 detik ──
function startPolling() {
  if (pollIv) clearInterval(pollIv);
  pollIv = setInterval(async function() {
    try {
      const res = await fetch(api('/status/' + jobId));
      const data = await res.json();
      handleStatusChange(data);
      if (data.status === 'waiting' || data.status === 'processing') {
        fetchAndRenderQueue(data.status);
      }
    } catch (_) {}
  }, 2000);
}

function stopPolling() {
  if (pollIv) { clearInterval(pollIv); pollIv = null; }
}

// ── Elapsed timer ──
function startElapsed() {
  if (elapsedIv) clearInterval(elapsedIv);
  elapsedIv = setInterval(function() {
    document.getElementById('log-elapsed').textContent = ((Date.now() - t0) / 1000).toFixed(1) + ' s';
  }, 100);
}

function stopElapsed() {
  if (elapsedIv) { clearInterval(elapsedIv); elapsedIv = null; }
}

// ── Start Process ──
async function startProcess() {
  if (!selFile) return;
  const btn = document.getElementById('btn-main');
  btn.disabled = true;
  btn.textContent = 'Mengupload…';

  document.getElementById('upload-section').style.display = 'none';
  ['prog-card', 'queue-card', 'log-card'].forEach(function(id) {
    document.getElementById(id).classList.add('show');
  });

  t0 = Date.now();
  lastStatus = null;
  jobId = null;
  startElapsed();

  document.getElementById('log-body').innerHTML = '';
  setProgress(0, 'Mengupload file…');
  renderSteps(-1);
  renderPipeline(0);

  addLog('[INFO] Memulai upload file…', 'i');

  const form = new FormData();
  form.append('file', selFile);

  try {
    const res = await fetch(api('/upload'), { method: 'POST', body: form });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.success) throw new Error(data.message || 'Upload gagal');
    jobId = data.job_id;
    handleStatusChange(data);
    startPolling();
  } catch (err) {
    stopElapsed();
    document.getElementById('upload-section').style.display = '';
    ['prog-card', 'queue-card', 'log-card'].forEach(function(id) {
      document.getElementById(id).classList.remove('show');
    });
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg> Proses File';
    alert('Upload gagal: ' + err.message + '\nPastikan backend online dan coba lagi.');
  }
}

// ── Result ──
function showResult() {
  stopElapsed();
  document.getElementById('prog-card').classList.remove('show');
  const outName = selFile ? selFile.name.replace(/\.pdf$/i, '') + '_Result.xlsx' : 'Hasil QC.xlsx';
  document.getElementById('result-fname').textContent = outName;
  document.getElementById('result-fmeta').textContent = 'Excel · Data QC Defect · Siap diunduh';
  document.getElementById('result-card').classList.add('show');
}

// ── Download ──
function doDownload() {
  if (!jobId) return;
  const btn = document.getElementById('btn-dl');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="width:17px;height:17px"><polyline points="20 6 9 17 4 12"/></svg> Mengunduh…';
  btn.style.opacity = '.75';
  window.location = api('/download/' + jobId);
  setTimeout(function() {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="width:17px;height:17px"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="15" x2="12" y2="4"/></svg> Unduh Lagi';
    btn.style.opacity = '1';
  }, 1500);
}

// ── Reset ──
function reset() {
  stopPolling();
  stopElapsed();
  selFile = null;
  jobId = null;
  lastStatus = null;
  currentProgress = 0;
  document.getElementById('file-input').value = '';
  document.getElementById('file-row').classList.remove('show');
  const btn = document.getElementById('btn-main');
  btn.disabled = true;
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg> Proses File';
  ['prog-card', 'queue-card', 'log-card', 'result-card'].forEach(function(id) {
    document.getElementById(id).classList.remove('show');
  });
  document.getElementById('upload-section').style.display = '';
  document.getElementById('prog-bar').style.width = '0%';
  document.getElementById('prog-pct').textContent = '0%';
  document.getElementById('log-body').innerHTML = '';
  document.getElementById('log-elapsed').textContent = '0.0 s';
  document.getElementById('prog-steps').innerHTML = '';
  renderPipeline(-1);
}

// ── Toast notification ──
function showToast(msg, type) {
  var existing = document.getElementById('toast-notif');
  if (existing) existing.remove();
  var colors = {
    ok:   { bg: 'var(--success-bg)', border: '#A7F3D0', color: '#059669' },
    err:  { bg: 'var(--danger-bg)',  border: '#FCA5A5', color: '#DC2626' },
    info: { bg: 'var(--primary-light)', border: '#BFDBFE', color: 'var(--primary)' }
  };
  var c = colors[type] || colors.info;
  var t = document.createElement('div');
  t.id = 'toast-notif';
  t.style.cssText = [
    'position:fixed', 'bottom:24px', 'right:24px', 'z-index:9999',
    'background:' + c.bg, 'border:1px solid ' + c.border,
    'color:' + c.color, 'border-radius:10px',
    'padding:12px 20px', 'font-size:13.5px', 'font-weight:600',
    'box-shadow:0 4px 20px rgba(0,0,0,.13)', 'max-width:320px',
    'display:flex', 'align-items:center', 'gap:8px',
    'animation:toast-in .25s ease', 'font-family:inherit'
  ].join(';');
  t.innerHTML = msg;
  document.body.appendChild(t);
  var style = document.createElement('style');
  style.textContent = '@keyframes toast-in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}';
  document.head.appendChild(style);
  setTimeout(function() {
    t.style.transition = 'opacity .3s';
    t.style.opacity = '0';
    setTimeout(function() { t.remove(); }, 350);
  }, 3500);
}

// ── Admin: buka dialog ganti Backend URL ──
async function openBackendConfig() {
  var current = CONFIG.API_BASE;
  var isDefault = !localStorage.getItem('API_BASE');

  var overlay = document.createElement('div');
  overlay.id = 'cfg-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:8888;display:flex;align-items:center;justify-content:center;padding:20px;font-family:inherit';

  overlay.innerHTML = [
    '<div style="background:#fff;border-radius:16px;padding:28px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2)">',
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">',
        '<div style="font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px">',
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:17px;height:17px;color:var(--primary)"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M4.93 4.93a10 10 0 0 0 14.14 14.14"/></svg>',
          'Konfigurasi Backend URL',
        '</div>',
        '<button onclick="document.getElementById(\'cfg-overlay\').remove()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--light);line-height:1;padding:2px">✕</button>',
      '</div>',
      '<div style="font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:500">URL Backend (Cloudflare Tunnel)</div>',
      '<input id="cfg-input" type="url" value="' + current + '" ',
        'style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;font-family:inherit;color:var(--text);outline:none;margin-bottom:6px;transition:border-color .15s" ',
        'placeholder="https://xxxx.trycloudflare.com" ',
        'onfocus="this.style.borderColor=\'var(--primary)\'" ',
        'onblur="this.style.borderColor=\'var(--border)\'">',
      '<div style="font-size:11.5px;color:var(--light);margin-bottom:20px">',
        isDefault
          ? '⚡ Menggunakan URL default'
          : '📌 URL tersimpan dari localStorage',
      '</div>',
      '<div style="display:flex;gap:8px;flex-wrap:wrap">',
        '<button id="cfg-save" onclick="saveBackendUrl()" ',
          'style="flex:1;background:linear-gradient(135deg,#2563EB,#7C3AED);color:#fff;border:none;border-radius:8px;padding:11px 18px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit">',
          'Simpan & Test Koneksi',
        '</button>',
        '<button onclick="resetBackendUrl()" ',
          'style="background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:8px;padding:11px 14px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit">',
          '↺ Reset ke Default',
        '</button>',
      '</div>',
    '</div>'
  ].join('');

  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.remove();
  });
  setTimeout(function() { document.getElementById('cfg-input').focus(); }, 50);
}

// ── Simpan URL baru (validasi dulu dengan GET /status) ──
async function saveBackendUrl() {
  var input = document.getElementById('cfg-input');
  if (!input) return;
  var url = input.value.trim().replace(/\/$/, '');

  if (!url.startsWith('http')) {
    showToast('❌ URL tidak valid. Harus diawali https://', 'err');
    return;
  }

  var btn = document.getElementById('cfg-save');
  if (btn) { btn.textContent = 'Menguji koneksi…'; btn.disabled = true; btn.style.opacity = '.7'; }

  try {
    var res = await fetch(url + '/status', { signal: AbortSignal.timeout(6000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    localStorage.setItem('API_BASE', url);
    var overlay = document.getElementById('cfg-overlay');
    if (overlay) overlay.remove();
    showToast('✅ Backend Connected', 'ok');
    setStatusPill(data.success === true || data.status !== undefined);
  } catch (err) {
    if (btn) { btn.textContent = 'Simpan & Test Koneksi'; btn.disabled = false; btn.style.opacity = '1'; }
    showToast('❌ Backend Tidak Dapat Dihubungi', 'err');
    setStatusPill(false);
  }
}

// ── Reset ke default URL ──
function resetBackendUrl() {
  localStorage.removeItem('API_BASE');
  var overlay = document.getElementById('cfg-overlay');
  if (overlay) overlay.remove();
  showToast('↺ URL backend direset ke default', 'info');
  (async function() {
    try {
      var res = await fetch(api('/status'), { signal: AbortSignal.timeout(5000) });
      var data = await res.json();
      setStatusPill(data.success === true);
    } catch (_) { setStatusPill(false); }
  })();
}

// ── Init: cek status backend saat halaman dibuka ──
(async function init() {
  try {
    const res = await fetch(api('/status'), { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    setStatusPill(data.success === true);
  } catch (_) {
    setStatusPill(false);
  }
})();
</script>
